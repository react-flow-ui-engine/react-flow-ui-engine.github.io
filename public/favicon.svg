    <path d="M286 176L324 176L304 144" stroke="url(#accentGradient)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="160" cy="176" r="48" fill="#F8FAFC"/>
    <circle cx="304" cy="176" r="42" fill="#F8FAFC"/>
    <circle cx="352" cy="336" r="48" fill="#F8FAFC"/>
    <circle cx="160" cy="176" r="20" fill="url(#flowGradient)"/>
