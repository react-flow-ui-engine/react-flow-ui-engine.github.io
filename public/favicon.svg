<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">React Flow UI Engine Logo Mark</title>
  <desc id="desc">A modern flow graph mark with three connected UI nodes representing conditional React UI flows.</desc>
  <defs>
    <linearGradient id="flowGradient" x1="96" y1="86" x2="416" y2="426" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38BDF8"/>
      <stop offset="0.52" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#A855F7"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="160" y1="158" x2="360" y2="356" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#34D399"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <filter id="softShadow" x="48" y="48" width="416" height="416" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#0F172A" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect x="56" y="56" width="400" height="400" rx="96" fill="#0F172A"/>
